<!DOCTYPE html>
<html>
<head>
    <title>Botie SaaS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">Botie™</div>
        <div class="nav-links">
            <a>#Product</a>
            <a>#Solutions</a>
            <a>#Contact</a>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero">

        <!-- LINKS -->
        <div class="hero-left">
            <h1>Size and simulate<br>power systems fast</h1>
            <p>
                Experience modern engineering workflow with
                high performance simulations and clean UI.
            </p>

            <div class="buttons">
                <button class="primary" onclick="klik()">Get Started</button>
                <button class="secondary">View demo</button>
            </div>
        </div>

        <!-- RECHTS (MOCK UI) -->
        <div class="hero-right">

            <div class="device">

                <div class="screen">
                    <h2>Dashboard</h2>
                    <p id="text">Ready for interaction</p>

                    <div class="mock-buttons">
                        <button onclick="veranderTekst()">Update</button>
                        <button onclick="kleurVeranderen()">Theme</button>
                    </div>

                    <div class="mock-grid">
                        <div>Analytics</div>
                        <div>Settings</div>
                        <div>Reports</div>
                        <div>Users</div>
                    </div>
                </div>

            </div>

        </div>

    </section>

    <script src="script.js"></script>

</body>
</html>
