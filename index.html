<!DOCTYPE html>
<html>
<head>
    <title>Botie SaaS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">Botie™</div>
        <div class="nav-links">
            <a>#Product</a>
            <a>#Solutions</a>
            <a>#Contact</a>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero">

        <!-- LINKS -->
        <div class="hero-left">
            <h1>Size and simulate<br>power systems fast</h1>
            <p>
                Experience modern engineering workflow with
                high performance simulations and clean UI.
            </p>

            <div class="buttons">
                <button class="primary" onclick="klik()">Get Started</button>
                <button class="secondary">View demo</button>
            </div>
        </div>

        <!-- RECHTS (DEVICES) -->
<div class="hero-right">

    <!-- iPad -->
    <div class="ipad">
        <div class="screen">
            <h2>Dashboard</h2>
            <p id="text">System ready</p>

            <div class="mock-grid">
                <div>Analytics</div>
                <div>Systems</div>
                <div>Reports</div>
                <div>Energy</div>
            </div>
        </div>
    </div>

    <!-- iPhone -->
    <div class="iphone">
        <div class="screen small">
            <h3>Mobile</h3>
            <p>Status OK ✅</p>
            <button onclick="veranderTekst()">Update</button>
        </div>
    </div>

</div>

    </section>

    <script src="script.js"></script>

</body>
</html>
